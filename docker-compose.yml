services:
  api:
    build:
      context: .
      dockerfile: infra/local/Dockerfile
    command: npx tsx apps/api/src/server.ts
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - email-automation-node-modules:/app/node_modules

  worker:
    build:
      context: .
      dockerfile: infra/local/Dockerfile
    command: npx tsx apps/worker/src/index.ts
    volumes:
      - .:/app
      - email-automation-node-modules:/app/node_modules

  web:
    build:
      context: .
      dockerfile: infra/local/Dockerfile
    command: npm run dev:web -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - email-automation-node-modules:/app/node_modules

volumes:
  email-automation-node-modules:
